name: Publish npm package

'on':
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Read package metadata
        id: package
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Choose publish version
        id: versioning
        run: |
          name="${{ steps.package.outputs.name }}"
          current="${{ steps.package.outputs.version }}"
          candidate="$current"
          bumped=false

          while npm view "${name}@${candidate}" version >/dev/null 2>&1; do
            bumped=true
            candidate=$(node -e "const [major, minor, patch] = process.argv[1].split('.').map(Number); process.stdout.write([major, minor, patch + 1].join('.'))" "$candidate")
          done

          if [ "$candidate" != "$current" ]; then
            node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8')); pkg.version = process.argv[1]; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');" "$candidate"
            echo "Bumped package version from ${current} to ${candidate}."
          else
            echo "Current package version ${current} has not been published yet."
          fi

          echo "version=$candidate" >> "$GITHUB_OUTPUT"
          echo "bumped=$bumped" >> "$GITHUB_OUTPUT"

      - name: Verify npm token secret exists
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is not configured." >&2
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish

      - name: Commit bumped version
        if: steps.versioning.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.versioning.outputs.version }}
          PACKAGE_NAME: ${{ steps.package.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): ${PACKAGE_NAME}@${VERSION} [skip ci]"
          git push
